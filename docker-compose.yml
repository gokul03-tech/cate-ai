version: "3.9"

# =============================================================================
# LexOrch-KG — Docker Compose Orchestration
# Services: Neo4j, ChromaDB, Backend (FastAPI), Frontend (React)
# Database: SQLite (Internal / Volume Map)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Neo4j Community Edition — Knowledge Graph database
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.18-community
    container_name: lexorch_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-lexorch_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lexorch_network

  # ---------------------------------------------------------------------------
  # ChromaDB — Vector store for embeddings and RAG
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.5
    container_name: lexorch_chromadb
    restart: unless-stopped
    environment:
      CHROMA_SERVER_HOST: 0.0.0.0
      ANONYMIZED_TELEMETRY: "False"
    volumes:
      - chromadb_data:/chroma/chroma
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - lexorch_network

  # ---------------------------------------------------------------------------
  # Backend — FastAPI application
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexorch_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///app/lexorch.db
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-lexorch_neo4j}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8000
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - reports_data:/app/reports
      - model_cache:/app/.cache
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lexorch_network

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite application
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: lexorch_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - lexorch_network

# =============================================================================
# Named Volumes
# =============================================================================
volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  chromadb_data:
  uploads_data:
  reports_data:
  model_cache:

# =============================================================================
# Networks
# =============================================================================
networks:
  lexorch_network:
    driver: bridge
